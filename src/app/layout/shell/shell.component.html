<mat-sidenav-container class="shell">
  <mat-sidenav mode="side" opened class="shell__sidenav">
    <div class="shell__brand">
      <div class="shell__brand-mark">
        <span class="shell__brand-orb"></span>
        <div>
          <p class="shell__eyebrow">VEGA OPS</p>
          <h1>Ops Hub</h1>
        </div>
      </div>
      <p class="shell__subtitle">{{ 'app.subtitle' | translate }}</p>
      <div class="shell__status-row">
        <span class="shell__status-pill shell__status-pill--online">Local-first</span>
        <span class="shell__status-pill">Companion Ready</span>
      </div>
    </div>

    <nav class="shell__nav">
      @for (item of navItems; track item.route) {
        <a
          class="shell__nav-link"
          [routerLink]="item.route"
          routerLinkActive="shell__nav-link--active"
        >
          <span class="material-symbols-outlined">{{ item.icon }}</span>
          <span>{{ item.labelKey | translate }}</span>
        </a>
      }
    </nav>
  </mat-sidenav>

  <mat-sidenav-content class="shell__content-area">
    <mat-toolbar class="shell__toolbar">
      <div class="shell__toolbar-block">
        <div class="shell__toolbar-title">
          {{ 'app.title' | translate }}
        </div>
        <div class="shell__toolbar-caption">Local-first engineering workspace</div>
      </div>
      <div class="shell__toolbar-metrics">
        <div class="shell__metric">
          <span>Mode</span>
          <strong>Workspace</strong>
        </div>
        <div class="shell__metric">
          <span>Surface</span>
          <strong>MVP</strong>
        </div>
      </div>
    </mat-toolbar>

    <main class="shell__content">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
